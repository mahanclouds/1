<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام در استریم‌شو</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .auth-container input, .auth-container select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        .auth-container select option {
            background: #302b63;
        }
        .auth-container input:focus {
            outline: none;
            border-color: #f5576c;
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-container button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(245,87,108,0.4);
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
        }
        .auth-link a {
            color: #f5576c;
            text-decoration: none;
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>📝 ثبت‌نام جدید</h2>
        <form id="registerForm" onsubmit="registerUser(event)">
            <input type="text" id="regUsername" placeholder="نام کاربری (حداقل ۳ کاراکتر)" required minlength="3">
            <input type="email" id="regEmail" placeholder="ایمیل" required>
            <input type="password" id="regPassword" placeholder="رمز عبور (حداقل ۶ کاراکتر)" required minlength="6">
            <input type="text" id="regFullName" placeholder="نام کامل">
            <select id="regRole">
                <option value="user">کاربر عادی</option>
                <option value="creator">سازنده محتوا</option>
            </select>
            <div id="registerError" class="error-msg"></div>
            <button type="submit">ثبت‌نام</button>
        </form>
        <div class="auth-link">
            قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html">ورود</a>
        </div>
        <div class="auth-link">
            <a href="index.html">🏠 بازگشت به صفحه اصلی</a>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
